name: Build & Deploy

on:
  push:
    tags:
      - 'v[0-9]*'

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ─── Job 1: Determine environment from tag ───
  determine-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      namespace: ${{ steps.env.outputs.namespace }}
      tag: ${{ steps.env.outputs.tag }}
    steps:
      - name: Determine environment from tag
        id: env
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if [[ "$TAG" == *"-rc."* ]] || [[ "$TAG" == *"-beta."* ]] || [[ "$TAG" == *"-alpha."* ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "namespace=staging" >> $GITHUB_OUTPUT
            echo "🚀 Deploying $TAG to STAGING"
          else
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "namespace=production" >> $GITHUB_OUTPUT
            echo "🚀 Deploying $TAG to PRODUCTION"
          fi

  # ─── Job 2: Build & push Docker images ───
  build:
    runs-on: ubuntu-latest
    needs: [determine-env]
    environment: ${{ needs.determine-env.outputs.environment }}
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/hugofrely/crm-qeylo-${{ matrix.service }}:${{ needs.determine-env.outputs.tag }}
            ${{ needs.determine-env.outputs.environment == 'production' && format('ghcr.io/hugofrely/crm-qeylo-{0}:latest', matrix.service) || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_API_URL={0}', vars.NEXT_PUBLIC_API_URL) || '' }}
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_WS_URL={0}', vars.NEXT_PUBLIC_WS_URL) || '' }}
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_POSTHOG_KEY={0}', vars.NEXT_PUBLIC_POSTHOG_KEY) || '' }}
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_POSTHOG_HOST={0}', vars.NEXT_PUBLIC_POSTHOG_HOST) || '' }}

  # ─── Job 3: Sync K8s secrets from GitHub environment ───
  sync-secrets:
    runs-on: ubuntu-latest
    needs: [determine-env, build]
    environment: ${{ needs.determine-env.outputs.environment }}
    env:
      NAMESPACE: ${{ needs.determine-env.outputs.namespace }}
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Sync crm-secrets
        run: |
          kubectl create secret generic crm-secrets \
            --namespace=$NAMESPACE \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --from-literal=CELERY_BROKER_URL="${{ secrets.CELERY_BROKER_URL }}" \
            --from-literal=CELERY_RESULT_BACKEND="${{ secrets.CELERY_RESULT_BACKEND }}" \
            --from-literal=ALLOWED_HOSTS="${{ secrets.ALLOWED_HOSTS }}" \
            --from-literal=CORS_ALLOWED_ORIGINS="${{ secrets.CORS_ALLOWED_ORIGINS }}" \
            --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=AI_MODEL="${{ secrets.AI_MODEL }}" \
            --from-literal=AI_FALLBACK_MODEL="${{ secrets.AI_FALLBACK_MODEL }}" \
            --from-literal=RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            --from-literal=EMAIL_FROM="${{ secrets.EMAIL_FROM }}" \
            --from-literal=EMAIL_ENCRYPTION_KEY="${{ secrets.EMAIL_ENCRYPTION_KEY }}" \
            --from-literal=GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --from-literal=MICROSOFT_CLIENT_ID="${{ secrets.MICROSOFT_CLIENT_ID }}" \
            --from-literal=MICROSOFT_CLIENT_SECRET="${{ secrets.MICROSOFT_CLIENT_SECRET }}" \
            --from-literal=R2_ACCOUNT_ID="${{ secrets.R2_ACCOUNT_ID }}" \
            --from-literal=R2_ACCESS_KEY_ID="${{ secrets.R2_ACCESS_KEY_ID }}" \
            --from-literal=R2_SECRET_ACCESS_KEY="${{ secrets.R2_SECRET_ACCESS_KEY }}" \
            --from-literal=R2_BUCKET_NAME="${{ secrets.R2_BUCKET_NAME }}" \
            --from-literal=R2_PUBLIC_URL="${{ secrets.R2_PUBLIC_URL }}" \
            --from-literal=STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            --from-literal=STRIPE_PUBLISHABLE_KEY="${{ secrets.STRIPE_PUBLISHABLE_KEY }}" \
            --from-literal=STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            --from-literal=STRIPE_PRO_PRICE_ID="${{ secrets.STRIPE_PRO_PRICE_ID }}" \
            --from-literal=STRIPE_TEAM_PRICE_ID="${{ secrets.STRIPE_TEAM_PRICE_ID }}" \
            --from-literal=BACKEND_URL="${{ secrets.BACKEND_URL }}" \
            --from-literal=FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
            --from-literal=NEXT_PUBLIC_API_URL="${{ vars.NEXT_PUBLIC_API_URL }}" \
            --from-literal=NEXT_PUBLIC_WS_URL="${{ vars.NEXT_PUBLIC_WS_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

  # ─── Job 4: Run Django migrations ───
  migrate:
    runs-on: ubuntu-latest
    needs: [determine-env, sync-secrets]
    environment: ${{ needs.determine-env.outputs.environment }}
    env:
      NAMESPACE: ${{ needs.determine-env.outputs.namespace }}
      TAG: ${{ needs.determine-env.outputs.tag }}
      RUN_NUMBER: ${{ github.run_number }}
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Run migrations
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: django-migrate-${TAG//\./-}-${RUN_NUMBER}
            namespace: $NAMESPACE
          spec:
            backoffLimit: 1
            ttlSecondsAfterFinished: 300
            template:
              spec:
                imagePullSecrets:
                  - name: ghcr-secret
                restartPolicy: Never
                containers:
                  - name: migrate
                    image: ghcr.io/hugofrely/crm-qeylo-backend:$TAG
                    command: ["python", "manage.py", "migrate", "--noinput"]
                    env:
                      - name: DATABASE_URL
                        valueFrom:
                          secretKeyRef:
                            name: crm-secrets
                            key: DATABASE_URL
                      - name: SECRET_KEY
                        valueFrom:
                          secretKeyRef:
                            name: crm-secrets
                            key: SECRET_KEY
                      - name: CELERY_BROKER_URL
                        valueFrom:
                          secretKeyRef:
                            name: crm-secrets
                            key: CELERY_BROKER_URL
                      - name: CELERY_RESULT_BACKEND
                        valueFrom:
                          secretKeyRef:
                            name: crm-secrets
                            key: CELERY_RESULT_BACKEND
          EOF

      - name: Wait for migration to complete
        run: |
          JOB_NAME="django-migrate-${TAG//\./-}-${RUN_NUMBER}"
          kubectl wait --for=condition=complete job/$JOB_NAME -n $NAMESPACE --timeout=120s || {
            echo "Migration did not complete successfully"
            FAILED=$(kubectl get job/$JOB_NAME -n $NAMESPACE -o jsonpath='{.status.failed}' 2>/dev/null || echo "0")
            if [ "$FAILED" != "0" ] && [ -n "$FAILED" ]; then
              echo "Migration failed!"
            else
              echo "Migration timed out"
            fi
            kubectl logs job/$JOB_NAME -n $NAMESPACE || true
            exit 1
          }
          echo "Migration completed successfully"

      - name: Check migration logs
        if: always()
        run: |
          kubectl logs job/django-migrate-${TAG//\./-}-${RUN_NUMBER} -n $NAMESPACE

      - name: Cleanup migration job
        if: always()
        run: |
          kubectl delete job django-migrate-${TAG//\./-}-${RUN_NUMBER} -n $NAMESPACE --ignore-not-found

  # ─── Job 5: Deploy to K3s ───
  deploy:
    runs-on: ubuntu-latest
    needs: [determine-env, migrate]
    environment: ${{ needs.determine-env.outputs.environment }}
    env:
      NAMESPACE: ${{ needs.determine-env.outputs.namespace }}
      TAG: ${{ needs.determine-env.outputs.tag }}
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s/backend/deployment.yaml -n $NAMESPACE
          kubectl apply -f k8s/backend/service.yaml -n $NAMESPACE
          kubectl apply -f k8s/celery/worker-deployment.yaml -n $NAMESPACE
          kubectl apply -f k8s/celery/beat-deployment.yaml -n $NAMESPACE
          kubectl apply -f k8s/frontend/deployment.yaml -n $NAMESPACE
          kubectl apply -f k8s/frontend/service.yaml -n $NAMESPACE

      - name: Update deployment images
        run: |
          kubectl set image deployment/backend \
            backend=ghcr.io/hugofrely/crm-qeylo-backend:$TAG \
            -n $NAMESPACE

          kubectl set image deployment/frontend \
            frontend=ghcr.io/hugofrely/crm-qeylo-frontend:$TAG \
            -n $NAMESPACE

          kubectl set image deployment/celery-worker \
            celery-worker=ghcr.io/hugofrely/crm-qeylo-backend:$TAG \
            -n $NAMESPACE

          kubectl set image deployment/celery-beat \
            celery-beat=ghcr.io/hugofrely/crm-qeylo-backend:$TAG \
            -n $NAMESPACE

      - name: Wait for rollouts
        run: |
          DEPLOYMENTS="backend frontend celery-worker celery-beat"
          FAILED=""

          for DEPLOY in $DEPLOYMENTS; do
            echo "⏳ Waiting for $DEPLOY rollout..."
            if ! kubectl rollout status deployment/$DEPLOY -n $NAMESPACE --timeout=300s; then
              echo "❌ $DEPLOY rollout failed, rolling back..."
              kubectl rollout undo deployment/$DEPLOY -n $NAMESPACE
              FAILED="$FAILED $DEPLOY"
            else
              echo "✅ $DEPLOY rolled out successfully"
            fi
          done

          if [ -n "$FAILED" ]; then
            echo "❌ Failed deployments:$FAILED"
            exit 1
          fi

          echo "🎉 All deployments rolled out successfully"
