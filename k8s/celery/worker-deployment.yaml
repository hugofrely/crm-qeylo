apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  labels:
    app: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: celery-worker
          image: ghcr.io/hugofrely/crm-qeylo-backend:latest
          command: ["celery", "-A", "config", "worker", "-l", "info", "--concurrency=2"]
          envFrom:
            - secretRef:
                name: crm-secrets
          resources:
            requests:
              cpu: 256m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
