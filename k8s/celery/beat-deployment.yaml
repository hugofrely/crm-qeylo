apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  labels:
    app: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: celery-beat
          image: ghcr.io/hugofrely/crm-qeylo-backend:latest
          command: ["celery", "-A", "config", "beat", "-l", "info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
          envFrom:
            - secretRef:
                name: crm-secrets
          resources:
            requests:
              cpu: 64m
              memory: 128Mi
            limits:
              cpu: 256m
              memory: 256Mi
