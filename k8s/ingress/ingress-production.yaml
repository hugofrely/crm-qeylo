apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: crm-production-web
  namespace: production
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`qeylo.com`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
          namespace: production
      services:
        - name: frontend
          port: 3000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: production
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: crm-production-secure
  namespace: production
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`qeylo.com`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: backend
          port: 8000
    - match: Host(`qeylo.com`) && PathPrefix(`/admin`)
      kind: Rule
      services:
        - name: backend
          port: 8000
    - match: Host(`qeylo.com`) && PathPrefix(`/ws`)
      kind: Rule
      middlewares:
        - name: strip-ws-prefix
      services:
        - name: backend
          port: 8000
    - match: Host(`qeylo.com`) && PathPrefix(`/static`)
      kind: Rule
      services:
        - name: backend
          port: 8000
    - match: Host(`qeylo.com`)
      kind: Rule
      services:
        - name: frontend
          port: 3000
  tls:
    secretName: cloudflare-origin-cert
